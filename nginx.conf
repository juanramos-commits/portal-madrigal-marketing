server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Assets con hash (JS, CSS, imágenes en /assets/) ────────────
    # Cache agresiva + immutable: el hash en el nombre garantiza unicidad
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── index.html — NUNCA cachear ────────────────────────────────
    # Desactivar etag y last-modified para evitar 304 en iOS Safari
    location = /index.html {
        internal;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Last-Modified "";
    }

    # ── Archivos estáticos sin hash (favicon, robots, manifest) ───
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|txt|webmanifest|xml)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Fuentes — cache larga ─────────────────────────────────────
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    # Todo lo que no sea archivo va a index.html, sin caché
    location / {
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Last-Modified "";
        try_files $uri $uri/ /index.html;
    }
}
