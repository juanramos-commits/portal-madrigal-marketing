<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madrigal Marketing | Portal</title>

    <!-- Favicon por defecto (tema se detecta al final del body) -->
    <link rel="icon" type="image/png" id="favicon" href="/favicon-light.png" />

    <!-- Preconnect al backend Supabase para acelerar la primera petición auth -->
    <link rel="preconnect" href="https://ootncgtcvwnrskqtamak.supabase.co" />
    <link rel="dns-prefetch" href="https://ootncgtcvwnrskqtamak.supabase.co" />

    <link rel="preload" as="image" href="/logo.webp" type="image/webp">
    <meta name="description" content="Portal de gestión de clientes de Madrigal Marketing" />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- CSS crítico: spinner de carga visible antes de que cargue el CSS externo -->
    <style>
      .page-loader{display:flex;justify-content:center;align-items:center;padding:100px 0;min-height:100vh;background:#0a0a0b}
      .page-loader .spinner{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.08);border-top-color:#2ee59d;border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Spinner visible mientras React carga — eliminado automáticamente por React al montar -->
      <div class="page-loader"><div class="spinner"></div></div>
    </div>

    <!-- Limpiar service workers y cachés residuales -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
    </script>

    <!-- Detectar tema del sistema y cambiar favicon (no bloqueante) -->
    <script>
      (function() {
        var favicon = document.getElementById('favicon');
        function updateFavicon() {
          favicon.href = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? '/favicon-light.png' : '/favicon-dark.png';
        }
        updateFavicon();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
