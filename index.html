<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Madrigal Marketing | Portal</title>
    
    <!-- Favicon por defecto -->
    <link rel="icon" type="image/png" id="favicon" href="/favicon-light.png" />
    
    <meta name="description" content="Portal de gestión de clientes de Madrigal Marketing" />
    <meta name="theme-color" content="#0a0a0b" />
    
    <script>
      // Detectar tema del sistema y cambiar favicon
      function updateFavicon() {
        const favicon = document.getElementById('favicon');
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        favicon.href = isDark ? '/favicon-light.png' : '/favicon-dark.png';
      }
      
      // Ejecutar al cargar
      updateFavicon();
      
      // Escuchar cambios de tema
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Limpiar service workers y cachés residuales (debe estar en HTML, no en JS bundle)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
